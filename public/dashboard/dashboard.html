<!DOCTYPE html>
<html lang="pt-br">

<head>
    <link rel="shortcut icon" href="../assets/icon/favicon2.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboards</title>

    
    <link rel="stylesheet" href="./../css/dashboards.css">
    <link rel="stylesheet" href="./../css/estilo.css" />
    <script src="../js/sessao.js"></script>

    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

    <!-- scripts do Chart.js - 2022-1 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!--FONT AWESOME-->
    <script src="https://kit.fontawesome.com/9f7414eb10.js" crossorigin="anonymous"></script>
</head>

<!-- <body onload=" atualizarFeed()"> -->

<body onload="validarSessao(), trazerDados()">

    <div class="janela">
        <div class="header-left">
            <h1>AquaTech</h1>

            <div class="hello">
                <h3>Olá, <span id="b_usuario">usuário</span>!</h3>
            </div>

            <div class="btn-nav-white">
                <a href="./cards.html">
                    <h3>Quiz</h3>
                </a>
            </div>

            <div class="btn-nav">

                <h3>Resultados</h3>

            </div>

            <div class="btn-logout" onclick="limparSessao()">
                <h3>Sair</h3>
            </div>

        </div>

        <div class="dash">

            <div style="position: relative; height:60vh; width:60vw">
                <canvas id="myChart"></canvas>
            </div>
        </div>

</body>

<script>

    b_usuario.innerHTML = sessionStorage.NOME_USUARIO;

    function trazerDados(){


        var idUsuario = sessionStorage.ID_USUARIO;

        fetch(`/quiz/resultado/${idUsuario}`)

        .then(function(resposta){

            if(resposta.ok){
                resposta.json().then(function(dados){
                    console.log(`Dados recebidos: ${dados}`)
                    addDados(dados)
            })
            } else {
                console.error(`Nada encotrado`)
            }
        })
            
        .catch(function(erro){
            console.error(`Erro = ${erro}`)
        })
    }

    function addDados(dados){

        const ctx = document.getElementById('myChart');

        console.log(dados);
        console.log(dados.length);

        var labels = [];
        var vlr = [];

        var cont = 0;

        while(cont < dados.length){

            labels.push(dados[cont].perfil);
            vlr.push(dados[cont].Total);


            cont++
        }


        new Chart(ctx, {
                    type: 'pie',
                    data: {
                    labels: labels,
                    datasets: [{
                        label: 'Perfil',
                        data: vlr,
                        borderWidth: 1
                    }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'top',
                            },
                            title: {
                                display: true,
                                text: 'Resultado'
                            
                        }
                    }
                }
        });

    }

</script>

</html>
