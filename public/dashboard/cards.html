<!DOCTYPE html>
<html lang="pt-br">

<head>
    <link rel="shortcut icon" href="../assets/icon/favicon2.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>


    <link rel="stylesheet" href="./../css/dashboards.css">
    <link rel="stylesheet" href="./../css/estilo.css" />

    <script src="../js/sessao.js"></script>
    <script src="../js/alerta.js"></script>
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
</head>

<body onload="validarSessao()">

    <div class="janela">

        <div class="header-left dash-header">

            <h1>Meu Titulo</h1>

            <div class="hello">
                <h3>Olá, <span id="b_usuario">usuário</span>!</h3>
            </div>

            <div class="btn-nav">
                <h3>Perguntas e Respostas</h3>
            </div>

            <div class="btn-nav-white">
                <a href="./dashboard.html">
                    <h3>Resultados</h3>
                </a>
            </div>

            <div class="btn-nav-white">
                <a href="./mural.html">
                    <h3>Avisos</h3>
                </a>
            </div>

            <div class="btn-logout" onclick="limparSessao()">
                <h3>Sair</h3>
            </div>

        </div>

    <div class="dash">

        <div class="container-quiz">

            <div class= "questions-container hide">

                <span class="question">Pergunta aqui?</span>
                <div class="answers-container">

                </div>

            </div>

            <div>

                <button class="start-quiz button">Começar Quiz!</button>
                <button class="next-question button hide">Próxima pergunta</button>

            </div>

        </div>

    </div>

<script>

    b_usuario.innerHTML = sessionStorage.NOME_USUARIO

const $startGameButton = document.querySelector(".start-quiz")
const $nextQuestionButton = document.querySelector(".next-question")
const $questionsContainer = document.querySelector(".questions-container")
const $questionText = document.querySelector(".question")
const $answersContainer = document.querySelector(".answers-container")

let currentQuestionIndex = 0

$startGameButton.addEventListener("click", startGame)
$nextQuestionButton.addEventListener("click", displayNextQuestion)

function startGame() {
    $startGameButton.classList.add("hide")
    $questionsContainer.classList.remove("hide")
    displayNextQuestion()
}

function displayNextQuestion() {
    resetState()

    if (questions.length === currentQuestionIndex) {
        return finishGame()
    }

    $questionText.textContent = questions[currentQuestionIndex].pergunta
    questions[currentQuestionIndex].opcoes.forEach(opcao => {
        const newAnswer = document.createElement("button")
        newAnswer.classList.add("button", "answer")
        newAnswer.textContent = opcao.texto
        newAnswer.dataset.perfil = opcao.perfil
        newAnswer.dataset.id = opcao.id
        $answersContainer.appendChild(newAnswer)
        newAnswer.addEventListener("click", selectAnswer)
    })
}

function resetState() {
    while ($answersContainer.firstChild) {
        $answersContainer.removeChild($answersContainer.firstChild)
    }
    $nextQuestionButton.classList.add("hide")
}

function selectAnswer(event) {
    const answerClicked = event.target

    document.querySelectorAll(".answer").forEach(button => {
        button.disabled = true
    })

    answerClicked.classList.add("correct")
    $nextQuestionButton.classList.remove("hide")
    currentQuestionIndex++

    fetch("/quiz/salvar", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(
            {
                fkUsuario: sessionStorage.ID_USUARIO,
                fkOpcao: answerClicked.dataset.id
            }
        )
    })

    .then(function(resposta){
        console.log("Resposta salva!");
    })
    .catch(function(erro){
        console.log("Erro ao salvar ",)
    })

}

function finishGame() {
    $questionsContainer.innerHTML = `
        <p class="final-message">
            Você completou o quiz!
            <span>Veja seus resultados na página de Resultados.</span>
        </p>
        <button onclick="window.location.reload()" class="button">Refazer quiz</button>
    `
}

const questions = [
    {
        // Pergunta 1

        pergunta: "Com qual dessas caracteristicas de estudo você mais se identifica?",
        opcoes: [
            { id: 1, texto: "Preciso estar em contato com o conteúdo de forma prática", perfil: "pratico" },
            { id: 2, texto: "Prefiro ler e me expressar por meio da escrita", perfil: "leitura/escrita" },
            { id: 3, texto: "Entendo melhor ouvindo as informações", perfil: "auditivo" },
            { id: 4, texto: "Entendo e me lembro melhor de informações visualizando o conteúdo", perfil: "visual" }
        ]
    },
    {
        // Pergunta 2

        pergunta: "Qual desses espaços você prefere estudar?",
        opcoes: [
            { id: 5, texto: "Um lugar onde eu posso me movimentar e fazer pausar frequentes para organizar as ideias", perfil: "pratico" },
            { id: 6, texto: "Apenas um notebook, PDFs e um bloco de notas", perfil: "leitura/escrita" },
            { id: 7, texto: "Um espaço onde eu posso falar em voz alta para entender melhor o conteúdo", perfil: "auditivo" },
            { id: 8, texto: "Preciso de estimulos visuais, um ambiente limpo e organizado com post-its e papeis", perfil: "visual" }
        ]
    },
    {

        // Pergunta 3

        pergunta: "Como você age quando precisa estudar um assunto muito difícil?",
        opcoes: [
            { id: 9, texto: "Corro para fazer vários exercícios até entender o assunto'", perfil: "pratico" },
            { id: 10, texto: "Leio artigos, livros, jornais e escrevo sobre o assunto", perfil: "leitura/escrita" },
            { id: 11, texto: "Pesquiso vídeos ou podcast sobre o assunto", perfil: "auditivo" },
            { id: 12, texto: "Procuro gráficos ou imagens sobre o tema", perfil: "visual" }
        ]
    },
    {
        // Pergunta 4

        pergunta: "Você vai montrar um móvel novo, por onde você começa?",
        opcoes: [
            { id: 13, texto: "Vou direto juntando as peças e procurando entender o móvel conforme vou montando", perfil: "pratico" },
            { id: 14, texto: "Primeiro, leio o manual de instruções", perfil: "leitura/escrita" },
            { id: 15, texto: "Coloco um vídeo ou peço para alguém me explicar", perfil: "auditivo" },
            { id: 16, texto: "Me baseio na imagem do móvel pronto na caixa para realizar minha montagem", perfil: "visual" }
        ] 
    },
    {

        // Pergunta 5

        pergunta: "Ao aprender algo novo, qual dessas frases te define melhor?",
        opcoes: [
            { id: 17, texto: "Tenho que treinar muito sobre este assunto", perfil: "pratico" },
            { id: 18, texto: "Vou anotar com minhas próprias palavras para não esquecer", perfil: "leitura/escrita" },
            { id: 19, texto: "Vou procurar um vídeo falando sobre o assunto", perfil: "auditivo" },
            { id: 20, texto: "Preciso de um desenho ou uma demonstração sobre o conteúdo", perfil: "visual" }
        ]
    }
]

</script>
</body>
</html>
