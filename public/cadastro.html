<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Cadastro</title>

  <!--Aqui carrega o arquivo JS com funções prontas-->
  <script src="./js/sessao.js"></script>

  <link rel="stylesheet" href="./css/estilo.css" />
  <link rel="icon" href="./assets/icon/favicon2.ico" />
  <link rel="preconnect" href="https://fonts.gstatic.com" />
</head>

<body>
  <!--header inicio-->
  <div class="header">
    <div class="container">
      <h1 class="titulo">AquaTech</h1>
      <ul class="navbar">
        <li>
          <a href="index.html">Inicial</a>
        </li>
        <li>
          <a href="simulador.html">Minha História</a>
        </li>
        <li>|</li>
        <li>
          <a href="login.html">Login</a>
        </li>
        <li class="agora">
          <a href="#">Cadastro</a>
        </li>
      </ul>
    </div>
  </div>
  <!--header fim-->

  <div class="login">
    <div class="alerta_erro">
      <div class="card_erro" id="cardErro">
        <span id="mensagem_erro"></span>
      </div>
    </div>
    <div class="container">
      <div class="card card-cadastro">
        <h2>Bom te ter aqui!</h2>
        <div class="formulario">

          <!--PLACEHOLDER é a msg que aparece onde o usuária irá digitar-->

          <div class="campo">
            <span>Nome:</span>
            <input id="nome_input" type="text" placeholder="Seu nome" />
          </div>
          <div class="campo">
            <span>E-mail:</span>
            <input id="email_input" type="text" placeholder="meuemail@provedor.com" />
          </div>
          <div class="campo">
            <span>Senha:</span>
            <input id="senha_input" type="password" placeholder="******" />
          </div>
          <div class="campo">
            <span>Confirmação da Senha:</span>
            <input id="confirmacao_senha_input" type="password" placeholder="******" />
          </div>
          <button class="botao" onclick="cadastrar()">Cadastrar</button>
        </div>

        <!--div onde aparece o botão carregando-->
        <div id="div_aguardar" class="loading-div">
          <img src="./assets/circle-loading.gif" id="loading-gif" />
        </div>

        <div id="div_erros_login"></div>

      </div>
    </div>
  </div>
</body>

</html>

<script>

  function cadastrar() {
    // aguardar();

    //Recupere o valor da nova input pelo nome do id
    // Agora vá para o método fetch logo abaixo
    var nomeVar = nome_input.value;
    var emailVar = email_input.value;
    var senhaVar = senha_input.value;
    var confirmacaoSenhaVar = confirmacao_senha_input.value;

    if (nomeVar == "" && emailVar == "" && senhaVar == "" && confirmacaoSenhaVar == "" ) {

      cardErro.style.display = "block";
      mensagem_erro.innerHTML = "(Mensagem de erro para todos os campos em branco)";

      finalizarAguardar();
      return false;

    } else if (nomeVar == "") {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML = "(Por favor, preencha o seu nome.)";

      finalizarAguardar();
      return false;

    } else if (emailVar == "") {

      cardErro.style.display = "block";
      mensagem_erro.innerHTML = "(Por favor, preencha o seu e-mail.)";

      finalizarAguardar();
      return false;

    } else if (senhaVar == ""){

      cardErro.style.display = "block";
      mensagem_erro.innerHTML = "(Por favor, crie uma senha.)";

      finalizarAguardar();
      return false;

    } else if(confirmacaoSenhaVar == "" ){

      cardErro.style.display = "block";
      mensagem_erro.innerHTML = "(Por favor, confirme a sua senha.)";

      finalizarAguardar();
      return false;

    } else if (senhaVar != confirmacaoSenhaVar){

      cardErro.style.display = "block";
      mensagem_erro.innerHTML = "(Coloque a mesma senha.)";

      finalizarAguardar();
      return false;

    } else {
      setInterval(sumirMensagem, 5000);
    }

    // fetch é onde o frontend conversa com o backend
    // Enviando o valor da nova input
    // fetch("/usuarios/cadastrar" é o enderoço da rota onde serão recebidos os dados
    fetch("/usuarios/cadastrar", {
      method: "POST", // é o tipo da requisição onde POST é usado para enviar dados
      headers: {
        "Content-Type": "application/json",
      }, // O headres avisa o servidor que os dados vêm em formato JSON
      body: JSON.stringify({ // Transfoma o objeto JS em texto JSON para serem enviados
        // crie um atributo que recebe o valor recuperado aqui
        // Agora vá para o arquivo routes/usuario.js
        nomeServer: nomeVar,
        emailServer: emailVar,
        senhaServer: senhaVar,
      }),
    })

    //.then executa quando o servidor está funcionando
      .then(function (resposta) {
        console.log("resposta: ", resposta);
        // Se resposta.okfor veradeira
        if (resposta.ok) {
          cardErro.style.display = "block";

          mensagem_erro.innerHTML =
            "Cadastro realizado com sucesso! Redirecionando para tela de Login...";

          setTimeout(() => {
            window.location = "login.html";
          }, "2000");

        } else {
          throw "Houve um erro ao tentar realizar o cadastro!";
        }
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
      });

    return false;
  }

  function sumirMensagem() {
    cardErro.style.display = "none";
  }
  
</script>
