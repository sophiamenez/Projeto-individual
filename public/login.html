<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <script src="./js/sessao.js"></script>

    <link rel="stylesheet" href="./css/estilo.css">

    <link rel="preconnect" href="https://fonts.gstatic.com">
</head>

<body>

    <!--Header-->

    <div class="header">
        <div class="container">
            <h1 class="titulo">Music</h1>
            <ul class="navbar">
                <li>
                    <a href="index.html">Inicial</a>
                </li>
                <li>
                    <a href="simulador.html">Minha História</a>
                </li>
                <li>|</li>
                <li class="agora">
                    <a href="#">Login</a>
                </li>
                <li>
                    <a href="cadastro.html">Cadastro</a>
                </li>
            </ul>
        </div>
    </div>


    <div class="login">
        <div class="alerta_erro">
            <div class="card_erro" id="cardErro">
                <span id="mensagem_erro"></span>
            </div>
        </div>
        <div class="container">
            <div class="card card-cadastro">
                <h2>Olá de volta!</h2>
                <div class="formulario">
                    <div class="campo">
                        <span>E-mail:</span>
                        <input id="email_input" type="text" placeholder="Login">
                    </div>
                    <div class="campo">
                        <span>Senha:</span>
                        <input id="senha_input" type="password" placeholder="******">
                    </div>

                    <div class="styleCad">
                        Não tem cadastro? <button class="botaoCad" onclick="window.location.href='cadastro.html'">Click aqui</button>
                    </div>


                    <button class="botao" onclick="entrar()">Entrar</button>
                </div>

                <div id="div_aguardar" class="loading-div">
                    <img src="./assets/circle-loading.gif" id="loading-gif">
                </div>

                <div id="div_erros_login"></div>
            </div>
        </div>
    </div>

</body>

</html>

<script>

    // Função principal do login
    function entrar() {

        aguardar();

        var emailVar = email_input.value;
        var senhaVar = senha_input.value;

        if (emailVar == "" && senhaVar == "") {

            cardErro.style.display = "block"
            mensagem_erro.innerHTML = "(Mensagem de erro para todos os campos em branco)";
            finalizarAguardar();
            return false;

        } else if (emailVar == "") {

            cardErro.style.display = "block"
            mensagem_erro.innerHTML = "(Por favor, preencha o e-mail)";
            finalizarAguardar();
            return false;

        } else if (!emailVar.includes('@')) {

            cardErro.style.display = "block";
            mensagem_erro.innerHTML = "(O email deve conter '@')";

            finalizarAguardar();
            return false;

        } else if (senhaVar == "") {

            cardErro.style.display = "block"
            mensagem_erro.innerHTML = "(Por favor, preencha a senha)";
            finalizarAguardar();
            return false;

        } else {

            // setInterval chama a função 'sumirMensagem' e faz desaparecer em 5 segundos
            setInterval(sumirMensagem, 5000)
        }

        // Mensagem que aparece no console.log
        console.log("FORM LOGIN: ", emailVar);
        console.log("FORM SENHA: ", senhaVar);

        // Função fetch para buscar e enviar dados
        fetch("/usuarios/autenticar", {

            // Enviando dados
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },

            // Recebendo os dados das inputs
            body: JSON.stringify({
                emailServer: emailVar,
                senhaServer: senhaVar
            })

            // Fim da função fetch e início do método .then e .catch.

            // Os método .then e .catch são usados para manipular Promises.

            /*
            Uma Promise é um objeto que representa um valor que pode estar disponível agora, no futuro ou nunca. 
            Promises (promessas) são frequentemente usadas para operações assíncronas, como fazer requisições de rede, 
            ler arquivos ou executar tarefas que levam algum tempo para serem concluídas.

            Método .then(): É usado para manipular o resultado (ou erro) de uma Promise. Ele permite que você especifique o que fazer 
            quando a Promise é resolvida ou quando é rejeitada.

            */

            // umaPromise.then(funcaoSucesso).catch(funcaoErro);

        }).then(function (resposta) {

            // Mensagem que aparece no console
            console.log("ESTOU NO THEN DO entrar()!")

            // If para verificar se os dados estão certos(ok)
            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.NOME_USUARIO = json.nome;
                    sessionStorage.ID_USUARIO = json.id;

                    setTimeout(function () {
                        window.location = "./dashboard/cards.html";
                    }, 1000); // apenas para exibir o loading

                });

                // Se não, mensagem de erro no console
            } else {

                console.log("Houve um erro ao tentar realizar o login!");

                resposta.text().then(texto => {
                    console.error(texto);
                    finalizarAguardar(texto);
                });
            }

            // Função .catch para erro
        }).catch(function (erro) {
            console.log(erro);
        })

        return false;
    }

    function sumirMensagem() {
        cardErro.style.display = "none"
    }

</script>
